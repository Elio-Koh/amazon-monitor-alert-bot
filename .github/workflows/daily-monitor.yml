name: Daily ASIN Monitor

on:
  schedule:
    - cron: "15 1 * * *"
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      current_report:
        description: "Send current ASIN data even if nothing changed"
        required: false
        default: "false"
      dry_run:
        description: "Print report to Actions logs without sending Feishu or publishing state"
        required: false
        default: "false"
      daily_report:
        description: "Compare against latest successful snapshot and send the daily report"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-asin-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PANGOLINFO_API_TOKEN: ${{ secrets.PANGOLINFO_API_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
      MONITOR_PARENT_ASINS: ${{ secrets.MONITOR_PARENT_ASINS }}
      STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
      XINGSHANG_MCP_URL_TEMPLATE: ${{ secrets.XINGSHANG_MCP_URL_TEMPLATE }}
      SELLERSPRITE_MCP_URL: ${{ secrets.SELLERSPRITE_MCP_URL }}
      SELLERSPRITE_MCP_SECRET_KEY: ${{ secrets.SELLERSPRITE_MCP_SECRET_KEY }}
      SORFTIME_MCP_URL: ${{ secrets.SORFTIME_MCP_URL }}
      SIF_MCP_URL: ${{ secrets.SIF_MCP_URL }}
      MARKETPLACE: ${{ secrets.MARKETPLACE || 'US' }}
      PANGOLIN_ZIPCODE: ${{ secrets.PANGOLIN_ZIPCODE || '10041' }}
      PANGOLIN_TIMEOUT_SECONDS: ${{ secrets.PANGOLIN_TIMEOUT_SECONDS || '45' }}
      MCP_TIMEOUT_SECONDS: ${{ secrets.MCP_TIMEOUT_SECONDS || '20' }}
      XINGSHANG_TIMEOUT_SECONDS: ${{ secrets.XINGSHANG_TIMEOUT_SECONDS || '90' }}
      XINGSHANG_FORCE_REFRESH: ${{ secrets.XINGSHANG_FORCE_REFRESH || 'false' }}
      CURRENT_REPORT: ${{ github.event.inputs.current_report || 'false' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      FORCE_CURRENT_REPORT: ${{ github.event.inputs.current_report == 'true' }}
      DAILY_REPORT: ${{ github.event_name == 'schedule' || github.event.inputs.daily_report == 'true' }}
      FORCE_DAILY_REPORT: ${{ github.event.inputs.daily_report == 'true' }}
      STATE_BRANCH: monitor-state
      STATE_PATH: state/latest.enc.json
      DELIVERY_STATE_PATH: state/delivery.enc.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch previous state
        run: |
          set -euo pipefail
          mkdir -p state
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$STATE_BRANCH"
            if git cat-file -e "FETCH_HEAD:latest.enc.json" 2>/dev/null; then
              git show "FETCH_HEAD:latest.enc.json" > "$STATE_PATH"
            fi
            if git cat-file -e "FETCH_HEAD:delivery.enc.json" 2>/dev/null; then
              git show "FETCH_HEAD:delivery.enc.json" > "$DELIVERY_STATE_PATH"
            fi
          fi

      - name: Run monitor
        run: |
          set -euo pipefail
          args=()
          if [ "$CURRENT_REPORT" = "true" ]; then
            args+=(--report-current)
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "$DAILY_REPORT" = "true" ]; then
            args+=(--daily-report)
          fi
          if [ "$FORCE_DAILY_REPORT" = "true" ]; then
            args+=(--force-daily-report)
          fi
          python monitor.py --state "$STATE_PATH" --output "$STATE_PATH" --delivery-state "$DELIVERY_STATE_PATH" "${args[@]}"

      - name: Publish state
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/monitor-state
          mkdir -p /tmp/monitor-state
          cp "$STATE_PATH" /tmp/monitor-state/latest.enc.json
          if [ -f "$DELIVERY_STATE_PATH" ]; then
            cp "$DELIVERY_STATE_PATH" /tmp/monitor-state/delivery.enc.json
          fi
          cd /tmp/monitor-state
          git init
          git checkout -b "$STATE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.enc.json
          if [ -f delivery.enc.json ]; then
            git add delivery.enc.json
          fi
          git commit -m "update asin monitor state"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "$STATE_BRANCH"
