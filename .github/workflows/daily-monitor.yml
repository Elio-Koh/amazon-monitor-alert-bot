name: Daily ASIN Monitor

on:
  schedule:
    - cron: "15 1 * * *"
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      current_report:
        description: "Send current ASIN data even if nothing changed"
        required: false
        default: "false"
      dry_run:
        description: "Print the Feishu payload preview without sending Feishu or publishing state"
        required: false
        default: "false"
      daily_report:
        description: "Compare against latest successful snapshot and send the daily report"
        required: false
        default: "false"
      render_state_only:
        description: "Decrypt latest monitor-state snapshot and print/upload a report without collecting or sending"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-asin-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PANGOLINFO_API_TOKEN: ${{ secrets.PANGOLINFO_API_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
      MONITOR_PARENT_ASINS: ${{ secrets.MONITOR_PARENT_ASINS }}
      STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
      XINGSHANG_MCP_URL_TEMPLATE: ${{ secrets.XINGSHANG_MCP_URL_TEMPLATE }}
      SELLERSPRITE_MCP_URL: ${{ secrets.SELLERSPRITE_MCP_URL }}
      SELLERSPRITE_MCP_SECRET_KEY: ${{ secrets.SELLERSPRITE_MCP_SECRET_KEY }}
      SORFTIME_MCP_URL: ${{ secrets.SORFTIME_MCP_URL }}
      SIF_MCP_URL: ${{ secrets.SIF_MCP_URL }}
      MARKETPLACE: ${{ secrets.MARKETPLACE || 'US' }}
      PANGOLIN_ZIPCODE: ${{ secrets.PANGOLIN_ZIPCODE || '10041' }}
      PANGOLIN_TIMEOUT_SECONDS: ${{ secrets.PANGOLIN_TIMEOUT_SECONDS || '45' }}
      MCP_TIMEOUT_SECONDS: ${{ secrets.MCP_TIMEOUT_SECONDS || '20' }}
      XINGSHANG_TIMEOUT_SECONDS: ${{ secrets.XINGSHANG_TIMEOUT_SECONDS || '90' }}
      XINGSHANG_FORCE_REFRESH: ${{ secrets.XINGSHANG_FORCE_REFRESH || 'false' }}
      ALERT_PRICE_PCT_THRESHOLD: ${{ secrets.ALERT_PRICE_PCT_THRESHOLD || '5' }}
      ALERT_CRITICAL_PRICE_PCT_THRESHOLD: ${{ secrets.ALERT_CRITICAL_PRICE_PCT_THRESHOLD || '10' }}
      ALERT_PRICE_ABS_THRESHOLD: ${{ secrets.ALERT_PRICE_ABS_THRESHOLD || '1' }}
      ALERT_RANK_PCT_THRESHOLD: ${{ secrets.ALERT_RANK_PCT_THRESHOLD || '20' }}
      ALERT_LOW_INVENTORY_THRESHOLD: ${{ secrets.ALERT_LOW_INVENTORY_THRESHOLD || '5' }}
      ALERT_DELIVERY_DAYS_THRESHOLD: ${{ secrets.ALERT_DELIVERY_DAYS_THRESHOLD || '2' }}
      ALERT_MAX_SUMMARY_ITEMS: ${{ secrets.ALERT_MAX_SUMMARY_ITEMS || '10' }}
      ALERT_MIN_SEVERITY: ${{ secrets.ALERT_MIN_SEVERITY || 'P1' }}
      ALERT_DEDUPE_WINDOW_DAYS: ${{ secrets.ALERT_DEDUPE_WINDOW_DAYS || '1' }}
      ALERT_SEND_NO_CHANGE: ${{ secrets.ALERT_SEND_NO_CHANGE || 'false' }}
      FEISHU_MESSAGE_MODE: ${{ secrets.FEISHU_MESSAGE_MODE || 'card' }}
      FULL_REPORT_OUTPUT: state-report.txt
      FULL_REPORT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CURRENT_REPORT: ${{ github.event.inputs.current_report || 'false' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      FORCE_CURRENT_REPORT: ${{ github.event.inputs.current_report == 'true' }}
      DAILY_REPORT: ${{ github.event_name == 'schedule' || github.event.inputs.daily_report == 'true' }}
      FORCE_DAILY_REPORT: ${{ github.event.inputs.daily_report == 'true' }}
      RENDER_STATE_ONLY: ${{ github.event.inputs.render_state_only || 'false' }}
      STATE_BRANCH: monitor-state
      STATE_PATH: state/latest.enc.json
      PREVIOUS_STATE_PATH: state/previous.enc.json
      DELIVERY_STATE_PATH: state/delivery.enc.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch previous state
        run: |
          set -euo pipefail
          mkdir -p state
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$STATE_BRANCH"
            if git cat-file -e "FETCH_HEAD:latest.enc.json" 2>/dev/null; then
              git show "FETCH_HEAD:latest.enc.json" > "$STATE_PATH"
            fi
            if git cat-file -e "FETCH_HEAD:previous.enc.json" 2>/dev/null; then
              git show "FETCH_HEAD:previous.enc.json" > "$PREVIOUS_STATE_PATH"
            fi
            if git cat-file -e "FETCH_HEAD:delivery.enc.json" 2>/dev/null; then
              git show "FETCH_HEAD:delivery.enc.json" > "$DELIVERY_STATE_PATH"
            fi
          fi
          if [ "$RENDER_STATE_ONLY" != "true" ] && [ -f "$STATE_PATH" ]; then
            cp "$STATE_PATH" "$PREVIOUS_STATE_PATH"
          fi

      - name: Run monitor
        run: |
          set -euo pipefail
          if [ "$RENDER_STATE_ONLY" = "true" ]; then
            python monitor.py --state "$STATE_PATH" --previous-state "$PREVIOUS_STATE_PATH" --render-state-only > state-report.txt
            cat state-report.txt
            exit 0
          fi
          args=()
          if [ "$CURRENT_REPORT" = "true" ]; then
            args+=(--report-current)
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "$DAILY_REPORT" = "true" ]; then
            args+=(--daily-report)
          fi
          if [ "$FORCE_DAILY_REPORT" = "true" ]; then
            args+=(--force-daily-report)
          fi
          python monitor.py --state "$STATE_PATH" --output "$STATE_PATH" --delivery-state "$DELIVERY_STATE_PATH" "${args[@]}"

      - name: Upload full daily report
        if: always() && env.DAILY_REPORT == 'true' && env.RENDER_STATE_ONLY != 'true' && hashFiles('state-report.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: asin-full-daily-report
          path: state-report.txt

      - name: Upload rendered state report
        if: env.RENDER_STATE_ONLY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: asin-rendered-state-report
          path: state-report.txt

      - name: Publish state
        if: env.DRY_RUN != 'true' && env.RENDER_STATE_ONLY != 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/monitor-state
          mkdir -p /tmp/monitor-state
          cp "$STATE_PATH" /tmp/monitor-state/latest.enc.json
          if [ -f "$PREVIOUS_STATE_PATH" ]; then
            cp "$PREVIOUS_STATE_PATH" /tmp/monitor-state/previous.enc.json
          fi
          if [ -f "$DELIVERY_STATE_PATH" ]; then
            cp "$DELIVERY_STATE_PATH" /tmp/monitor-state/delivery.enc.json
          fi
          cd /tmp/monitor-state
          git init
          git checkout -b "$STATE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.enc.json
          if [ -f previous.enc.json ]; then
            git add previous.enc.json
          fi
          if [ -f delivery.enc.json ]; then
            git add delivery.enc.json
          fi
          git commit -m "update asin monitor state"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "$STATE_BRANCH"
